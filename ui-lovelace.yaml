views:
  # ── Dashboard ──────────────────────────────────────────────
  - title: Dashboard
    icon: mdi:view-dashboard
    type: sections
    max_columns: 4
    badges:
      - type: entity
        entity: sensor.current_location
        name: Location
        color: blue
      - type: entity
        entity: sensor.aranet4_3361b_temperature
        name: Indoor
        icon: mdi:thermometer
        color: orange
      - type: entity
        entity: sensor.aranet4_3361b_carbon_dioxide
        name: CO2
        icon: mdi:molecule-co2
    sections:
      # Lights
      - type: grid
        cards:
          - type: heading
            heading: Lights
            heading_style: title
            icon: mdi:lightbulb-multiple
          - type: picture-elements
            image: /local/images/floorplan-light.png
            dark_mode_image: /local/images/floorplan-dark.png
            elements:
              - type: state-icon
                entity: light.bedroom_light
                style:
                  left: "68%"
                  top: "40%"
                tap_action:
                  action: toggle
              - type: state-icon
                entity: light.kitchenette_light
                style:
                  left: "43%"
                  top: "40%"
                tap_action:
                  action: toggle
              - type: state-icon
                entity: light.kitchenette_light_strip
                style:
                  left: "43%"
                  top: "78%"
                tap_action:
                  action: toggle
              - type: state-icon
                entity: light.hallway_light
                style:
                  left: "18%"
                  top: "37%"
                tap_action:
                  action: toggle
              - type: state-icon
                entity: light.bathroom_light
                style:
                  left: "27%"
                  top: "67%"
                tap_action:
                  action: toggle
              - type: state-icon
                entity: light.laundry_room_light
                style:
                  left: "7.5%"
                  top: "68%"
                tap_action:
                  action: toggle
          - type: custom:mushroom-light-card
            entity: light.living_room
            show_brightness_control: true
            fill_container: false
            icon_type: icon
            layout: horizontal
            icon: mdi:sofa
          - square: false
            type: grid
            grid_options:
              rows: auto
            cards:
              - type: custom:mushroom-light-card
                entity: light.laundry_room_light
                name: Laundry Room
                use_light_color: false
                show_brightness_control: false
                fill_container: false
                icon: mdi:washing-machine
                layout: vertical
              - type: custom:mushroom-light-card
                entity: light.hallway_light
                name: Hallway
                layout: vertical
                show_brightness_control: false
                icon: mdi:coat-rack
              - type: custom:mushroom-light-card
                entity: light.bathroom_light
                name: Bathroom
                fill_container: false
                show_brightness_control: false
                collapsible_controls: false
                show_color_temp_control: false
                use_light_color: false
                layout: vertical
                icon: mdi:bathtub

      # Conditions
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Conditions
            icon: mdi:thermometer
          - type: custom:mushroom-template-card
            primary: Temperature
            secondary: "{{ states('sensor.aranet4_3361b_temperature') }}°C"
            icon: mdi:thermometer
            icon_color: orange
          - type: custom:mushroom-template-card
            primary: Humidity
            secondary: "{{ states('sensor.aranet4_3361b_humidity') }}%"
            icon: mdi:water-percent
            icon_color: |
              {% set h = states('sensor.aranet4_3361b_humidity') | int(0) %}
              {% if h < 30 or h > 60 %}orange{% else %}blue{% endif %}
          - type: custom:mini-graph-card
            name: Indoor Temperature (24h)
            hours_to_show: 24
            animate: true
            line_width: 2
            entities:
              - entity: sensor.aranet4_3361b_temperature
                color: "#f97316"
          - type: custom:mini-graph-card
            name: Indoor CO2 (24h)
            icon: mdi:molecule-co2
            hours_to_show: 24
            animate: true
            entities:
              - entity: sensor.aranet4_3361b_carbon_dioxide
            color_thresholds:
              - value: 400
                color: "#22c55e"
              - value: 1000
                color: "#eab308"
              - value: 1400
                color: "#ef4444"

      # Vacuum
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Vacuum
            icon: mdi:robot-vacuum
          - type: custom:vacuum-card
            entity: vacuum.barnaba
            stats:
              default:
                - attribute: bin_full
                  value_template: >-
                    {% if value %}
                      Full
                    {% else %}
                      Empty
                    {% endif %}
                  subtitle: Bin Status
          - type: entities
            title: Maintenance
            show_header_toggle: false
            entities:
              - entity: sensor.barnaba_battery
                name: Battery
              - entity: sensor.barnaba_total_missions
                name: Total Missions
              - entity: sensor.barnaba_successful_missions
                name: Successful
              - entity: sensor.barnaba_failed_missions
                name: Failed
              - entity: sensor.barnaba_average_mission_time
                name: Avg Mission Time
              - entity: sensor.barnaba_total_cleaning_time
                name: Total Runtime

      # Automations
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Automations
            icon: mdi:home-clock-outline
          - type: custom:scheduler-card
            include:
              - binary_sensor.barnaba_bin_full
              - device_tracker
              - fan
              - light
              - sensor.undefined_iphone_battery_state
              - vacuum
            exclude:
              - light.living_room

      # Purifiers
      - type: grid
        cards:
          - type: heading
            heading: Purifiers
            heading_style: title
            icon: mdi:air-purifier
          - type: custom:purifier-card
            entity: fan.zhimi_mb5_ab82_air_purifier
            stats:
              - entity_id: sensor.zhimi_mb5_ab82_filter_life_level
                unit: "%"
                subtitle: Filter Remaining
              - entity_id: sensor.zhimi_mb5_ab82_moto_speed_rpm
                unit: RPM
                subtitle: Motor Speed
              - entity_id: sensor.zhimi_mb5_ab82_filter_left_time
                unit: days
                subtitle: Filter Life
            shortcuts:
              - name: Sleep
                icon: mdi:weather-night
                preset_mode: Sleep
              - name: "100%"
                icon: mdi:circle-slice-8
                percentage: 100
              - name: Auto
                icon: mdi:brightness-auto
                preset_mode: Auto
            aqi:
              entity_id: sensor.zhimi_mb5_ab82_pm25_density
              unit: ug/m3
          - type: custom:mini-graph-card
            name: PM2.5 (24h)
            icon: mdi:blur
            hours_to_show: 24
            animate: true
            entities:
              - entity: sensor.zhimi_mb5_ab82_pm25_density
                color: "#06b6d4"
            color_thresholds:
              - value: 0
                color: "#22c55e"
              - value: 12
                color: "#eab308"
              - value: 35
                color: "#ef4444"

      # Printer & Car
      - type: grid
        cards:
          - type: heading
            heading: Printer
            heading_style: title
            icon: mdi:printer
          - type: entities
            title: Brother HL-L2442DW
            entities:
              - entity: sensor.hl_l2442dw_status
                name: Status
                icon: ""
              - entity: sensor.hl_l2442dw_black_toner_remaining
                name: Toner Remaining
          - type: heading
            heading: Car
            heading_style: title
            icon: mdi:car
          - type: picture
            image_entity: image.skoda_kamiq_main_render_of_vehicle
            alt_text: Main Render of Vehicle
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: lock.skoda_kamiq_door_lock
                    state_not: unavailable
                card:
                  type: custom:mushroom-lock-card
                  entity: lock.skoda_kamiq_door_lock
                  name: Vehicle Status
              - type: conditional
                conditions:
                  - condition: state
                    entity: lock.skoda_kamiq_door_lock
                    state: unavailable
                card:
                  type: custom:mushroom-entity-card
                  entity: binary_sensor.skoda_kamiq_doors_locked
                  name: Vehicle Status
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.skoda_kamiq_last_updated
                    name: Last Update
                  - type: custom:mushroom-entity-card
                    entity: sensor.skoda_kamiq_range
                    name: Range
                  - type: custom:mushroom-entity-card
                    entity: sensor.skoda_kamiq_fuel_level
                    name: Fuel

  # ── Network ────────────────────────────────────────────────
  - title: Network
    icon: mdi:wifi
    type: sections
    sections:
      # Pi-hole
      - type: grid
        cards:
          - type: heading
            heading: Pi-hole
            heading_style: title
            icon: mdi:pi-hole
          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:mini-graph-card
                    name: Total Queries
                    icon: mdi:earth
                    animate: true
                    entities:
                      - entity: sensor.pi_hole_dns_queries_today
                        color: "#06b6d4"
                        unit: "\u200E"
                  - type: custom:mini-graph-card
                    name: Queries Blocked
                    icon: mdi:hand-back-right
                    animate: true
                    entities:
                      - entity: sensor.pi_hole_ads_blocked_today
                        color: "#ef4444"
                        unit: "\u200E"
                  - type: custom:mini-graph-card
                    name: Percentage Blocked
                    icon: mdi:chart-arc
                    animate: true
                    entities:
                      - entity: sensor.pi_hole_ads_percentage_blocked_today
                        color: "#f97316"
                  - type: custom:mini-graph-card
                    name: Domains on Adlists
                    icon: mdi:list-box
                    animate: true
                    entities:
                      - entity: sensor.pi_hole_domains_blocked
                        color: "#22c55e"
                        unit: "\u200E"
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: switch.pi_hole
                    name: Blocking
                  - type: custom:mushroom-update-card
                    entity: update.pi_hole_core_update_available
                    name: Core
                  - type: custom:mushroom-update-card
                    entity: update.pi_hole_ftl_update_available
                    name: FTL
                  - type: custom:mushroom-update-card
                    entity: update.pi_hole_web_update_available
                    name: Web Interface

      # Network
      - type: grid
        cards:
          - type: heading
            heading: Network
            heading_style: title
            icon: mdi:router-wireless
          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:mini-graph-card
                    name: Parsify
                    icon: mdi:wifi
                    animate: true
                    entities:
                      - entity: sensor.parsify
                        color: "#06b6d4"
                  - type: custom:mini-graph-card
                    name: Parsify IoT
                    icon: mdi:wifi
                    animate: true
                    entities:
                      - entity: sensor.parsify_iot
                        color: "#06b6d4"
                  - type: custom:mini-graph-card
                    name: Parsify Guest
                    icon: mdi:wifi
                    animate: true
                    entities:
                      - entity: sensor.parsify_guest_2
                        color: "#06b6d4"
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: sensor.ucg_ultra_uptime
                    icon: mdi:timelapse
                    primary: Uptime
                    secondary: "{{ relative_time(states(entity) | as_datetime) }}"
                  - type: custom:mushroom-update-card
                    entity: update.ucg_ultra
                  - type: custom:mushroom-update-card
                    entity: update.usw_lite_8_poe
                  - type: custom:mushroom-update-card
                    entity: update.u7_pro

      # Internet
      - type: grid
        cards:
          - type: heading
            heading: Internet
            heading_style: title
            icon: mdi:web
          - type: custom:mini-graph-card
            name: WAN Latency
            icon: mdi:lan-connect
            hours_to_show: 6
            animate: true
            entities:
              - entity: sensor.ucg_ultra_cloudflare_wan_latency
                name: Cloudflare
                color: "#f97316"
              - entity: sensor.ucg_ultra_google_wan_latency
                name: Google
                color: "#06b6d4"
              - entity: sensor.ucg_ultra_microsoft_wan_latency
                name: Microsoft
                color: "#22c55e"

  # ── Energy ─────────────────────────────────────────────────
  - title: Energy
    icon: mdi:transmission-tower
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Grid Carbon Intensity
            heading_style: title
            icon: mdi:molecule-co2
          - type: custom:mini-graph-card
            name: CO2 Intensity (24h)
            icon: mdi:molecule-co2
            hours_to_show: 24
            animate: true
            entities:
              - entity: sensor.electricity_maps_co2_intensity
            color_thresholds:
              - value: 0
                color: "#22c55e"
              - value: 200
                color: "#eab308"
              - value: 400
                color: "#ef4444"

  # ── System ─────────────────────────────────────────────────
  - title: System
    icon: mdi:memory
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: System
            heading_style: title
            icon: mdi:memory
          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:mini-graph-card
                    name: CPU
                    hours_to_show: 6
                    animate: true
                    entities:
                      - entity: sensor.system_monitor_processor_use
                    color_thresholds:
                      - value: 0
                        color: "#22c55e"
                      - value: 50
                        color: "#eab308"
                      - value: 80
                        color: "#ef4444"
                  - type: custom:mini-graph-card
                    name: Memory
                    hours_to_show: 6
                    icon: mdi:memory
                    animate: true
                    entities:
                      - entity: sensor.system_monitor_memory_use
                    color_thresholds:
                      - value: 0
                        color: "#22c55e"
                      - value: 2000
                        color: "#eab308"
                      - value: 3200
                        color: "#ef4444"
                  - type: custom:mini-graph-card
                    name: Disk
                    icon: mdi:harddisk
                    animate: true
                    entities:
                      - entity: sensor.system_monitor_disk_use
                        color: "#06b6d4"
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-update-card
                    entity: update.home_assistant_supervisor_update
                    name: Supervisor
                    show_buttons_control: false
                  - type: custom:mushroom-update-card
                    entity: update.home_assistant_core_update
                    name: Core
                    show_buttons_control: false
                  - type: custom:mushroom-update-card
                    entity: update.home_assistant_operating_system_update
                    show_buttons_control: false
                    name: Operating System
                  - type: custom:mushroom-update-card
                    entity: update.hacs_update
                    name: HACS

      # Batteries
      - type: grid
        cards:
          - type: heading
            heading: Batteries
            heading_style: title
            icon: mdi:battery-alert
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.aranet4_3361b_battery
                name: Aranet4
              - entity: sensor.living_room_motion_battery
                name: Living Room Motion
              - entity: sensor.hallway_motion_battery
                name: Hallway Motion
              - entity: sensor.bathroom_motion_battery
                name: Bathroom Motion
              - entity: sensor.laundry_room_motion_battery
                name: Laundry Room Motion
              - entity: sensor.living_room_switch_battery
                name: Living Room Switch
              - entity: sensor.barnaba_battery
                name: Vacuum

  # ── Presence Debug ────────────────────────────────────────
  - title: Presence
    icon: mdi:motion-sensor
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: State
            heading_style: title
            icon: mdi:map-marker
          - type: entities
            entities:
              - entity: input_boolean.presence_enabled
                name: Presence-based lighting
              - entity: input_select.current_room
                name: Current room
              - entity: person.antek
                name: Person
              - entity: input_number.presence_grace_seconds
                name: Grace seconds
              - entity: input_number.light_on_lux_threshold
                name: LR light-on lux threshold
              - entity: sensor.living_room_motion_illuminance
                name: LR illuminance (now)

      - type: grid
        cards:
          - type: heading
            heading: Rooms
            heading_style: title
            icon: mdi:walk
          - type: markdown
            content: |
              | Room | Motion | Light | Last change |
              |---|---|---|---|
              | Living Room | {{ states('binary_sensor.living_room_motion_occupancy') }} | {{ states('light.living_room') }} | {{ (now() - states.binary_sensor.living_room_motion_occupancy.last_changed).total_seconds() | int }} s |
              | Hallway | {{ states('binary_sensor.hallway_motion_occupancy') }} | {{ states('light.hallway_light') }} | {{ (now() - states.binary_sensor.hallway_motion_occupancy.last_changed).total_seconds() | int }} s |
              | Bathroom | {{ states('binary_sensor.bathroom_motion_occupancy') }} | {{ states('light.bathroom_light') }} | {{ (now() - states.binary_sensor.bathroom_motion_occupancy.last_changed).total_seconds() | int }} s |
              | Laundry Room | {{ states('binary_sensor.laundry_room_motion_occupancy') }} | {{ states('light.laundry_room_light') }} | {{ (now() - states.binary_sensor.laundry_room_motion_occupancy.last_changed).total_seconds() | int }} s |

      - type: grid
        cards:
          - type: heading
            heading: Occupancy timeline (24h)
            heading_style: title
            icon: mdi:chart-timeline-variant
          - type: custom:apexcharts-card
            graph_span: 24h
            span:
              end: minute
            yaxis:
              - id: lanes
                show: false
                min: 0.5
                max: 4.5
            apex_config:
              chart:
                height: 240
              legend:
                show: true
                position: top
              grid:
                show: false
              tooltip:
                enabled: false
            all_series_config:
              type: line
              curve: stepline
              stroke_width: 18
              yaxis_id: lanes
              show:
                legend_value: false
                in_header: false
            series:
              - entity: binary_sensor.living_room_motion_occupancy
                name: Living Room
                transform: "return x === 'on' ? 4 : null;"
              - entity: binary_sensor.hallway_motion_occupancy
                name: Hallway
                transform: "return x === 'on' ? 3 : null;"
              - entity: binary_sensor.bathroom_motion_occupancy
                name: Bathroom
                transform: "return x === 'on' ? 2 : null;"
              - entity: binary_sensor.laundry_room_motion_occupancy
                name: Laundry Room
                transform: "return x === 'on' ? 1 : null;"
