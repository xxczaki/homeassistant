# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

homeassistant:
  packages: !include_dir_named packages

light:
  - platform: group
    name: Living Room
    entities:
      - light.kitchenette_light
      - light.bedroom_light

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1

recorder:
  commit_interval: 30
  exclude:
    entities:
      - sensor.pi_hole_latest_data_refresh
      - sensor.pi_hole_remaining_until_blocking_mode

adaptive_lighting:
  - name: "Home"
    lights:
      - light.living_room
      - light.bathroom_light
      - light.laundry_room_light
      - light.hallway_light
    min_brightness: 75
    max_brightness: 100
    min_color_temp: 2000
    max_color_temp: 5500
    sleep_brightness: 30
    sleep_color_temp: 1000
    sleep_rgb_or_color_temp: color_temp
    sleep_transition: 1.0
    min_sunset_time: "21:00:00"
    transition: 45.0
    initial_transition: 1.0
    interval: 90
    intercept: true
    multi_light_intercept: true
    take_over_control: true
    take_over_control_mode: pause_all
    skip_redundant_commands: true
    adapt_only_on_bare_turn_on: false
    adapt_delay: 0.0
    brightness_mode: linear
    brightness_mode_time_dark: 18000
    brightness_mode_time_light: 3600

lovelace:
  resource_mode: yaml
  resources:
    - url: /hacsfiles/vacuum-card/vacuum-card.js
      type: module
    - url: /hacsfiles/purifier-card/purifier-card.js
      type: module
    - url: /hacsfiles/lovelace-mushroom/mushroom.js
      type: module
    - url: /hacsfiles/mini-graph-card/mini-graph-card-bundle.js
      type: module
    - url: /hacsfiles/scheduler-card/scheduler-card.js
      type: module
  dashboards:
    lovelace:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Overview
      icon: mdi:view-dashboard
      show_in_sidebar: true

shell_command:
  push_config: "/bin/sh /config/scripts/push_config.sh"
