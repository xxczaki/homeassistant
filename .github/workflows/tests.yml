name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs of the same PR/branch when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  presence:
    name: Presence automations (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: tests/uv.lock

      - name: Pin Python from mise.toml
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.4"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run pytest
        run: uv run pytest --tb=short
