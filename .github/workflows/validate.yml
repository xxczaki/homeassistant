name: Validate HA Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Home Assistant config check
        uses: frenck/action-home-assistant@v1
        with:
          path: "."
          secrets: secrets.example.yaml
          version: stable
