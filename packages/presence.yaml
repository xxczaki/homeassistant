input_boolean:
  presence_enabled:
    name: Presence-based lighting
    icon: mdi:motion-sensor
    initial: true
    # Single kill switch for all presence automations. Turn OFF when guests
    # are over, you're hosting, or the model is otherwise getting in the
    # way. Every presence automation gates on this; nothing fires while
    # it's off (motion, hallway, room cleanup, leave-home – all paused).
    # Manual light control via the Hue dimmer / app continues to work.

input_number:
  presence_grace_seconds:
    name: Minimum light on
    min: 20
    max: 600
    step: 5
    initial: 180
    mode: slider
    unit_of_measurement: s
    icon: mdi:clock-time-eight
  light_on_lux_threshold:
    name: Light on lux threshold
    min: 0
    max: 50
    step: 5
    mode: slider
    unit_of_measurement: lx
    icon: mdi:sun-wireless
input_select:
  current_room:
    name: Current room
    options:
      - none
      - living_room
      - bathroom
      - laundry_room
    icon: mdi:room-service

template:
  - sensor:
      - name: Current Location
        unique_id: current_location
        state: >
          {% set p = states('person.antek') %}
          {% if p == 'home' %}
            {% set room = states('input_select.current_room') %}
            {% if room in ['none', 'unknown', 'unavailable'] %}
              Home
            {% else %}
              {{ room | replace('_', ' ') | title }}
            {% endif %}
          {% elif p == 'not_home' %}
            Away
          {% else %}
            {{ p | title }}
          {% endif %}
        icon: >
          {% if states('person.antek') == 'home' %}mdi:home-account{% else %}mdi:walk{% endif %}
