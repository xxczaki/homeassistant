input_boolean:
  suppress_living_room_auto_light:
    name: Suppress living room auto light
    icon: mdi:light-switch-off
  suppress_bathroom_auto_light:
    name: Suppress bathroom auto light
    icon: mdi:light-switch-off
  suppress_laundry_room_auto_light:
    name: Suppress laundry room auto light
    icon: mdi:light-switch-off

input_number:
  presence_grace_seconds:
    name: Minimum light on
    min: 20
    max: 600
    step: 5
    initial: 180
    mode: slider
    unit_of_measurement: s
    icon: mdi:clock-time-eight
  light_on_lux_threshold:
    name: Light on lux threshold
    min: 0
    max: 50
    step: 1
    mode: slider
    unit_of_measurement: lx
    icon: mdi:sun-wireless
input_select:
  current_room:
    name: Current room
    options:
      - none
      - living_room
      - bathroom
      - laundry_room
    icon: mdi:room-service

template:
  - sensor:
      - name: Current Location
        unique_id: current_location
        state: >
          {% set p = states('person.antek') %}
          {% if p == 'home' %}
            {% set room = states('input_select.current_room') %}
            {% if room in ['none', 'unknown', 'unavailable'] %}
              Home
            {% else %}
              {{ room | replace('_', ' ') | title }}
            {% endif %}
          {% elif p == 'not_home' %}
            Away
          {% else %}
            {{ p | title }}
          {% endif %}
        icon: >
          {% if states('person.antek') == 'home' %}mdi:home-account{% else %}mdi:walk{% endif %}
