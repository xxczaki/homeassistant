- id: '1720829310579'
  alias: Vaccum bin full notification
  description: ''
  trigger:
  - type: turned_on
    platform: device
    device_id: 69a94c88a0bde4adc0f6e4f4bcb68053
    entity_id: 5a10181ce38b82bf5b33676724856cb4
    domain: binary_sensor
  condition: []
  action:
  - service: notify.mobile_app_undefined_iphone
    metadata: {}
    data:
      title: Vaccum bin full
      message: Empty the bin or the scheduled cleaning will fail!
  mode: single
- id: '1764467462408'
  alias: Lights sleep mode
  description: ''
  triggers:
  - trigger: time
    at: 02:00:00
    id: sleep_on
  - trigger: time
    at: 08:00:00
    id: sleep_off
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sleep_on
      sequence:
      - target:
          entity_id: switch.adaptive_lighting_sleep_mode_living_room
        action: switch.turn_on
    - conditions:
      - condition: trigger
        id: sleep_off
      sequence:
      - target:
          entity_id: switch.adaptive_lighting_sleep_mode_living_room
        action: switch.turn_off
    default: []
  mode: single
- id: hallway_light_on
  alias: 'Presence: Hallway motion -> hallway on (lux gated)'
  description: ''
  triggers:
  - entity_id: binary_sensor.hallway_motion
    to: 'on'
    trigger: state
  conditions:
  - condition: template
    value_template: >-
      {{ states('sensor.hallway_illuminance')|float(0)
         < states('input_number.light_on_lux_threshold')|float(0) }}
  actions:
  - target:
      entity_id: light.hallway
    action: light.turn_on
  mode: single
- id: hallway_light_off
  alias: 'Presence: Hallway motion clear -> hallway off'
  description: >-
    Triggers on hallway motion sensor going off (~10s after last motion).
    Fixes bug where mode:restart on current_room changes kept resetting the timer.
  triggers:
  - entity_id: binary_sensor.hallway_motion
    to: 'off'
    trigger: state
  conditions:
  - condition: state
    entity_id: light.hallway
    state: 'on'
  actions:
  - variables:
      min_on: "{{ states('input_number.presence_grace_seconds')|int(30) }}"
      hallway_on_for: >-
        {{ (as_timestamp(now()) - as_timestamp(states.light.hallway.last_changed)) | int(0) }}
      remaining: "{{ [0, (min_on - hallway_on_for)] | max }}"
  - delay:
      seconds: "{{ remaining }}"
  - target:
      entity_id: light.hallway
    action: light.turn_off
  mode: restart
- id: room_light_on_and_track
  alias: 'Presence: Room motion -> light on + track room (Layer 1)'
  description: >-
    Primary room entry automation. Tracks current room, turns on room light
    (lux gated, suppress checked), immediately turns off other rooms where
    motion is off (Layer 1 turn-off), and clears prev room suppress flag.
  triggers:
  - entity_id: binary_sensor.living_room_motion
    to: 'on'
    trigger: state
    id: living_room
  - entity_id: binary_sensor.bathroom_motion
    to: 'on'
    trigger: state
    id: bathroom
  - entity_id: binary_sensor.laundry_room_motion
    to: 'on'
    trigger: state
    id: laundry_room
  actions:
  - variables:
      prev_room: "{{ states('input_select.current_room') }}"
      new_room: "{{ trigger.id }}"
      rooms:
        living_room:
          light: light.living_room
          motion: binary_sensor.living_room_motion
          suppress: input_boolean.suppress_living_room_auto_light
        bathroom:
          light: light.bathroom
          motion: binary_sensor.bathroom_motion
          suppress: input_boolean.suppress_bathroom_auto_light
        laundry_room:
          light: light.laundry_room
          motion: binary_sensor.laundry_room_motion
          suppress: input_boolean.suppress_laundry_room_auto_light
  - target:
      entity_id: input_select.current_room
    data:
      option: "{{ new_room }}"
    action: input_select.select_option
  - choose:
    - conditions:
      - condition: template
        value_template: >-
          {{ is_state(rooms[new_room].suppress, 'off')
             and states('sensor.' ~ new_room ~ '_illuminance')|float(0)
                < states('input_number.light_on_lux_threshold')|float(0) }}
      sequence:
      - target:
          entity_id: "{{ rooms[new_room].light }}"
        action: light.turn_on
  - repeat:
      for_each: "{{ rooms.keys() | reject('eq', new_room) | list }}"
      sequence:
      - condition: template
        value_template: >-
          {{ is_state(rooms[repeat.item].light, 'on')
             and is_state(rooms[repeat.item].motion, 'off') }}
      - target:
          entity_id: "{{ rooms[repeat.item].light }}"
        action: light.turn_off
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ prev_room in rooms and prev_room != new_room }}"
      sequence:
      - target:
          entity_id: "{{ rooms[prev_room].suppress }}"
        action: input_boolean.turn_off
  mode: parallel
  max: 3
- id: hallway_quick_room_turnoff
  alias: 'Presence: Hallway motion -> turn off non-current rooms (Layer 2)'
  description: >-
    Redundant safety: on hallway motion, waits grace period then turns off all
    non-current rooms where motion is off. Safe to restart because it checks
    final state after delay, not captured state.
  triggers:
  - entity_id: binary_sensor.hallway_motion
    to: 'on'
    trigger: state
  actions:
  - delay:
      seconds: "{{ states('input_number.presence_grace_seconds')|int(30) }}"
  - variables:
      current: "{{ states('input_select.current_room') }}"
      rooms:
        living_room:
          light: light.living_room
          motion: binary_sensor.living_room_motion
        bathroom:
          light: light.bathroom
          motion: binary_sensor.bathroom_motion
        laundry_room:
          light: light.laundry_room
          motion: binary_sensor.laundry_room_motion
  - repeat:
      for_each: "{{ rooms.keys() | reject('eq', current) | list }}"
      sequence:
      - condition: template
        value_template: >-
          {{ is_state(rooms[repeat.item].light, 'on')
             and is_state(rooms[repeat.item].motion, 'off') }}
      - target:
          entity_id: "{{ rooms[repeat.item].light }}"
        action: light.turn_off
  mode: restart
- id: room_light_fallback_off
  alias: 'Presence: Room motion timeout -> light off (Layer 3)'
  description: >-
    Safety net: if a room motion sensor has been off for the configured timeout,
    turn off that room light. Catches any edge cases missed by Layers 1 and 2.
    The for: parameter auto-resets if motion cycles off->on->off.
    Living room is exempt (sensor position unreliable for stillness detection).
  triggers:
  - entity_id: binary_sensor.bathroom_motion
    to: 'off'
    for:
      minutes: "{{ states('input_number.room_light_timeout_minutes')|int(10) }}"
    trigger: state
    id: bathroom
  - entity_id: binary_sensor.laundry_room_motion
    to: 'off'
    for:
      minutes: "{{ states('input_number.room_light_timeout_minutes')|int(10) }}"
    trigger: state
    id: laundry_room
  conditions:
  - condition: template
    value_template: "{{ is_state('light.' ~ trigger.id, 'on') }}"
  actions:
  - target:
      entity_id: "{{ 'light.' ~ trigger.id }}"
    action: light.turn_off
  - condition: template
    value_template: "{{ states('input_select.current_room') == trigger.id }}"
  - target:
      entity_id: input_select.current_room
    data:
      option: none
    action: input_select.select_option
  mode: parallel
  max: 3
- id: manual_light_override
  alias: 'Presence: Manual light override suppress management'
  description: >-
    Sets suppress flag when a light is turned off while motion is active (manual
    override). Clears suppress flag when a light is turned on by any means.
    Automations that turn off lights only do so when motion is off, so suppress
    is only set on genuine manual intervention.
  triggers:
  - entity_id: light.living_room
    to: 'off'
    trigger: state
    id: living_room_off
  - entity_id: light.bathroom
    to: 'off'
    trigger: state
    id: bathroom_off
  - entity_id: light.laundry_room
    to: 'off'
    trigger: state
    id: laundry_room_off
  - entity_id: light.living_room
    to: 'on'
    trigger: state
    id: living_room_on
  - entity_id: light.bathroom
    to: 'on'
    trigger: state
    id: bathroom_on
  - entity_id: light.laundry_room
    to: 'on'
    trigger: state
    id: laundry_room_on
  actions:
  - variables:
      map:
        living_room_off:
          room: living_room
          turned: 'off'
        bathroom_off:
          room: bathroom
          turned: 'off'
        laundry_room_off:
          room: laundry_room
          turned: 'off'
        living_room_on:
          room: living_room
          turned: 'on'
        bathroom_on:
          room: bathroom
          turned: 'on'
        laundry_room_on:
          room: laundry_room
          turned: 'on'
      room: "{{ map[trigger.id].room }}"
      turned: "{{ map[trigger.id].turned }}"
      suppress_entity: "{{ 'input_boolean.suppress_' ~ room ~ '_auto_light' }}"
      motion_entity: "{{ 'binary_sensor.' ~ room ~ '_motion' }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ turned == 'off' and is_state(motion_entity, 'on') }}"
      sequence:
      - target:
          entity_id: "{{ suppress_entity }}"
        action: input_boolean.turn_on
    - conditions:
      - condition: template
        value_template: "{{ turned == 'on' }}"
      sequence:
      - target:
          entity_id: "{{ suppress_entity }}"
        action: input_boolean.turn_off
  mode: parallel
  max: 6
- id: leave_home_lights_off
  alias: 'Presence: Leave home -> all lights off'
  description: >-
    Primary: person.antek not_home for 2 minutes (WiFi-based via UniFi).
    Fallback: all motion sensors off for 10 minutes (if person is not home).
    Also clears all suppress flags.
  triggers:
  - entity_id: person.antek
    to: not_home
    for:
      minutes: 2
    trigger: state
    id: person_left
  - platform: template
    value_template: >-
      {{ is_state('binary_sensor.hallway_motion', 'off')
         and is_state('binary_sensor.living_room_motion', 'off')
         and is_state('binary_sensor.bathroom_motion', 'off')
         and is_state('binary_sensor.laundry_room_motion', 'off') }}
    for:
      minutes: 10
    id: no_motion
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id: person_left
    - condition: and
      conditions:
      - condition: trigger
        id: no_motion
      - condition: not
        conditions:
        - condition: state
          entity_id: person.antek
          state: home
  actions:
  - target:
      entity_id:
      - light.hallway
      - light.living_room
      - light.bathroom
      - light.laundry_room
      - light.kitchen
      - light.bed
    action: light.turn_off
  - target:
      entity_id: input_select.current_room
    data:
      option: none
    action: input_select.select_option
  - target:
      entity_id:
      - input_boolean.suppress_living_room_auto_light
      - input_boolean.suppress_bathroom_auto_light
      - input_boolean.suppress_laundry_room_auto_light
    action: input_boolean.turn_off
  mode: single
- id: push_config_on_shutdown
  alias: 'System: Push config to GitHub on shutdown'
  description: >-
    Commits and pushes any uncommitted config changes to GitHub before HA shuts
    down. Catches UI-initiated automation edits between git_pull cycles.
  triggers:
  - trigger: homeassistant
    event: shutdown
  actions:
  - action: shell_command.push_config
  mode: single
