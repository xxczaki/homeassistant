- id: '1764467462408'
  alias: Lights sleep mode
  description: ''
  triggers:
  - trigger: time
    at: 02:00:00
    id: sleep_on
  - trigger: time
    at: 08:00:00
    id: sleep_off
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sleep_on
      sequence:
      - target:
          entity_id: switch.adaptive_lighting_sleep_mode_living_room
        action: switch.turn_on
    - conditions:
