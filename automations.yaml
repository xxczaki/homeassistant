- id: hallway_light_on
  alias: 'Presence: Hallway motion -> hallway on (lux gated)'
  description: ''
  triggers:
  - entity_id: binary_sensor.hallway_motion_occupancy
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - target:
      entity_id: light.hallway_light
    action: light.turn_on
  mode: single
- id: hallway_light_off
  alias: 'Presence: Hallway motion clear -> hallway off'
  description: >-
    Triggers on hallway motion sensor going off (~10s after last motion).
    Fixes bug where mode:restart on current_room changes kept resetting the timer.
  triggers:
  - entity_id: binary_sensor.hallway_motion_occupancy
    to: 'off'
    trigger: state
  conditions:
  - condition: state
    entity_id: light.hallway_light
    state: 'on'
  actions:
  - variables:
      min_on: "{{ states('input_number.presence_grace_seconds')|float(30)|int }}"
      hallway_on_for: >-
        {{ (as_timestamp(now()) - as_timestamp(states.light.hallway_light.last_changed)) | int(0) }}
      remaining: "{{ [0, (min_on - hallway_on_for)] | max }}"
  - delay:
      seconds: "{{ remaining }}"
  - target:
      entity_id: light.hallway_light
    action: light.turn_off
  mode: restart
- id: room_light_on_and_track
  alias: 'Presence: Room motion -> light on + track room (Layer 1)'
  description: >-
    On any tracked room motion, set current_room and turn on that room's
    light (suppress checked). The grace-period cleanup of OTHER rooms is
    handled by room_cleanup_after_settle (Layer 1b), which triggers on
    current_room state CHANGE - so motion-on cycles within the same room
    don't restart the cleanup timer (input_select.select_option to the
    same value is a no-op and emits no state change).
  triggers:
  - entity_id: binary_sensor.living_room_motion_occupancy
    to: 'on'
    trigger: state
    id: living_room
  - entity_id: binary_sensor.bathroom_motion_occupancy
    to: 'on'
    trigger: state
    id: bathroom
  - entity_id: binary_sensor.laundry_room_motion_occupancy
    to: 'on'
    trigger: state
    id: laundry_room
  actions:
  - variables:
      prev_room: "{{ states('input_select.current_room') }}"
      new_room: "{{ trigger.id }}"
      rooms:
        living_room:
          light: light.living_room
          suppress: input_boolean.suppress_living_room_auto_light
        bathroom:
          light: light.bathroom_light
          suppress: input_boolean.suppress_bathroom_auto_light
        laundry_room:
          light: light.laundry_room_light
          suppress: input_boolean.suppress_laundry_room_auto_light
  - target:
      entity_id: input_select.current_room
    data:
      option: "{{ new_room }}"
    action: input_select.select_option
  - choose:
    - conditions:
      - condition: template
        value_template: >-
          {{ is_state(rooms[new_room].suppress, 'off') }}
      sequence:
      - target:
          entity_id: "{{ rooms[new_room].light }}"
        action: light.turn_on
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ prev_room in rooms and prev_room != new_room }}"
      sequence:
      - target:
          entity_id: "{{ rooms[prev_room].suppress }}"
        action: input_boolean.turn_off
  mode: single
- id: room_cleanup_after_settle
  alias: 'Presence: Cleanup non-current rooms after settle (Layer 1b)'
  description: >-
    Fires when current_room transitions to a tracked room AND stays there
    for presence_grace_seconds. Turns off the lights of every other tracked
    room. Decoupled from motion triggers so brief motion-on/off cycles
    within the same room (LR PIR pirOToUDelay=5s causes off->on every few
    seconds while user sits) don't restart the timer - only entering a
    DIFFERENT room does.
  # State trigger fires when current_room transitions into one of the
  # tracked rooms and stays there for grace. HA's `to: [list]` with for:
  # has two known quirks:
  #   1. when state moves between two values that both match to:, the
  #      timer doesn't reset — it fires with `trigger.to_state` set to
  #      the FIRST match, not the current value.
  #   2. per-room triggers (one per to: value) can race: an old timer
  #      may not cancel cleanly when state moves to a different to:
  #      value, causing two stale fires.
  # Mitigation: use a single list-form trigger and read current_room
  # *live* in the action body. The `for:` semantics still wait for the
  # entity to remain inside the to: set, which is what we want.
  triggers:
  - trigger: state
    entity_id: input_select.current_room
    to:
    - living_room
    - bathroom
    - laundry_room
    for:
      seconds: "{{ states('input_number.presence_grace_seconds')|float(180)|int }}"
  actions:
  - variables:
      current: "{{ states('input_select.current_room') }}"
      rooms:
        living_room: light.living_room
        bathroom: light.bathroom_light
        laundry_room: light.laundry_room_light
  - repeat:
      for_each: "{{ rooms.keys() | reject('eq', current) | list }}"
      sequence:
      - condition: template
        value_template: "{{ is_state(rooms[repeat.item], 'on') }}"
      - target:
          entity_id: "{{ rooms[repeat.item] }}"
        action: light.turn_off
  mode: single
- id: hallway_dwell_turnoff
  alias: 'Presence: Hallway dwell -> turn off current room (Layer 2)'
  description: >-
    Fires when hallway motion has been 'on' AND every tracked room motion
    has been 'off' continuously for 90s, i.e. the user is genuinely
    dwelling in the hallway (hanging laundry, tying shoes) rather than
    transiting. Any tracked-room motion during the window resets the timer,
    so arrival sequences like LR->hallway->laundry->hallway->LR don't
    trigger this. On fire, turn off current_room's light and reset
    current_room to none.
  triggers:
  - trigger: template
    value_template: >-
      {{ is_state('binary_sensor.hallway_motion_occupancy', 'on')
         and is_state('binary_sensor.living_room_motion_occupancy', 'off')
         and is_state('binary_sensor.bathroom_motion_occupancy', 'off')
         and is_state('binary_sensor.laundry_room_motion_occupancy', 'off') }}
    for:
      seconds: 90
  actions:
  - variables:
      current: "{{ states('input_select.current_room') }}"
      rooms:
        living_room: light.living_room
        bathroom: light.bathroom_light
        laundry_room: light.laundry_room_light
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ current in rooms }}"
      sequence:
      - target:
          entity_id: "{{ rooms[current] }}"
        action: light.turn_off
      - target:
          entity_id: input_select.current_room
        data:
          option: none
        action: input_select.select_option
  mode: single
- id: manual_light_override
  alias: 'Presence: Manual light override suppress management'
  description: >-
    Sets suppress flag when a light is turned off while motion is active (manual
    override). Clears suppress flag when a light is turned on by any means.
    Automations that turn off lights only do so when motion is off, so suppress
    is only set on genuine manual intervention.
  triggers:
  - entity_id: light.living_room
    to: 'off'
    trigger: state
    id: living_room_off
  - entity_id: light.bathroom_light
    to: 'off'
    trigger: state
    id: bathroom_off
  - entity_id: light.laundry_room_light
    to: 'off'
    trigger: state
    id: laundry_room_off
  - entity_id: light.living_room
    to: 'on'
    trigger: state
    id: living_room_on
  - entity_id: light.bathroom_light
    to: 'on'
    trigger: state
    id: bathroom_on
  - entity_id: light.laundry_room_light
    to: 'on'
    trigger: state
    id: laundry_room_on
  actions:
  - variables:
      map:
        living_room_off:
          room: living_room
          turned: 'off'
        bathroom_off:
          room: bathroom
          turned: 'off'
        laundry_room_off:
          room: laundry_room
          turned: 'off'
        living_room_on:
          room: living_room
          turned: 'on'
        bathroom_on:
          room: bathroom
          turned: 'on'
        laundry_room_on:
          room: laundry_room
          turned: 'on'
      room: "{{ map[trigger.id].room }}"
      turned: "{{ map[trigger.id].turned }}"
      suppress_entity: "{{ 'input_boolean.suppress_' ~ room ~ '_auto_light' }}"
      motion_entity: "{{ 'binary_sensor.' ~ room ~ '_motion_occupancy' }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ turned == 'off' and is_state(motion_entity, 'on') }}"
      sequence:
      - target:
          entity_id: "{{ suppress_entity }}"
        action: input_boolean.turn_on
    - conditions:
      - condition: template
        value_template: "{{ turned == 'on' }}"
      sequence:
      - target:
          entity_id: "{{ suppress_entity }}"
        action: input_boolean.turn_off
  mode: parallel
  max: 6
- id: leave_home_lights_off
  alias: 'Presence: Leave home -> all lights off'
  description: >-
    Primary: person.antek not_home for 2 minutes (WiFi-based via UniFi).
    Fallback: all motion sensors off for 10 minutes (if person is not home).
    Turns everything off and clears all suppress flags. No snapshot/restore -
    on return, room motion just triggers Layer 1 normally.
  triggers:
  - entity_id: person.antek
    to: not_home
    for:
      minutes: 2
    trigger: state
    id: person_left
  - platform: template
    value_template: >-
      {{ is_state('binary_sensor.hallway_motion_occupancy', 'off')
         and is_state('binary_sensor.living_room_motion_occupancy', 'off')
         and is_state('binary_sensor.bathroom_motion_occupancy', 'off')
         and is_state('binary_sensor.laundry_room_motion_occupancy', 'off') }}
    for:
      minutes: 10
    id: no_motion
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id: person_left
    - condition: and
      conditions:
      - condition: trigger
        id: no_motion
      - condition: not
        conditions:
        - condition: state
          entity_id: person.antek
          state: home
  actions:
  - target:
      entity_id:
      - light.hallway_light
      - light.living_room
      - light.bathroom_light
      - light.laundry_room_light
      - light.kitchen_light
      - light.bedroom_light
    action: light.turn_off
  - target:
      entity_id: input_select.current_room
    data:
      option: none
    action: input_select.select_option
  - target:
      entity_id:
      - input_boolean.suppress_living_room_auto_light
      - input_boolean.suppress_bathroom_auto_light
      - input_boolean.suppress_laundry_room_auto_light
    action: input_boolean.turn_off
  mode: single
- id: living_room_switch_toggle
  alias: 'Switch: Living room toggle + all others off'
  description: >-
    Hue dimmer switch on_press toggles living room lights and turns off all other
    lights. off_press turns off everything including living room.
  triggers:
  - trigger: mqtt
    topic: zigbee2mqtt/Living Room Switch/action
    payload: on_press
    id: 'on'
  - trigger: mqtt
    topic: zigbee2mqtt/Living Room Switch/action
    payload: off_press
    id: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: 'on'
      sequence:
      - action: light.toggle
        target:
          entity_id: light.living_room
      - action: light.turn_off
        target:
          entity_id:
          - light.hallway_light
          - light.bathroom_light
          - light.laundry_room_light
          - light.kitchenette_light_strip
    - conditions:
      - condition: trigger
        id: 'off'
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.living_room
          - light.hallway_light
          - light.bathroom_light
          - light.laundry_room_light
          - light.kitchenette_light_strip
  mode: single
- id: push_config_on_shutdown
  alias: 'System: Push config to GitHub on shutdown'
  description: >-
    Commits and pushes any uncommitted config changes to GitHub before HA shuts
    down. Catches UI-initiated automation edits between git_pull cycles.
  triggers:
  - trigger: homeassistant
    event: shutdown
  actions:
  - action: shell_command.push_config
  mode: single
- id: kitchen_switch_toggle
  alias: 'Switch: Kitchen switch -> sync kitchenette light strip (TRÅDFRI)'
  description: >-
    ZBMINIL2 with relay physically bypassed. Syncs the TRÅDFRI strip to the
    switch's reported state instead of toggling on every MQTT action, so
    spurious/phantom action events from the modded switch can't flip the light.
  triggers:
  - trigger: state
    entity_id: switch.kitchen_switch
    from: 'off'
    to: 'on'
    id: 'on'
  - trigger: state
    entity_id: switch.kitchen_switch
    from: 'on'
    to: 'off'
    id: 'off'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.kitchenette_light_strip
    - conditions:
      - condition: trigger
        id: 'off'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.kitchenette_light_strip
  mode: single
